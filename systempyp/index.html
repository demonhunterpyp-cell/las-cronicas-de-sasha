<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay &amp; Play System</title>
  <style>
    :root{
      --bg-1:#0f1728;
      --bg-2:#1a2337;
      --bg-3:#24304a;
      --gold:#d8b160;
      --text:#f7eedc;
      --text-soft:#ddd2b7;
      --shadow:0 22px 50px rgba(0,0,0,.33);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      color:var(--text);
      font-family:Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 80% 12%, rgba(216,177,96,.10), transparent 20%),
        radial-gradient(circle at 20% 82%, rgba(216,177,96,.08), transparent 20%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
    }
    a{color:inherit;text-decoration:none}
    
.interworld-bar{
  position:relative;
  z-index:40;
  background:rgba(9,13,24,.86);
  border-bottom:1px solid rgba(216,177,96,.16);
  backdrop-filter:blur(10px);
}

.interworld-inner{
  width:min(1180px, 92%);
  margin:0 auto;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 0;
}

.interworld-group{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.interworld-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 14px;
  border-radius:999px;
  border:1px solid rgba(216,177,96,.18);
  background:rgba(255,255,255,.04);
  color:#f2e2c3;
  font-size:.95rem;
  line-height:1;
  text-decoration:none;
  transition:.22s ease;
}

.interworld-link:hover{
  transform:translateY(-1px);
  background:rgba(255,255,255,.07);
  border-color:rgba(216,177,96,.32);
  color:#fff2d2;
}

.interworld-link.primary{
  color:#4a2f12;
  background:linear-gradient(180deg, #d8b160 0%, #b78537 100%);
  border-color:#8b6327;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.34);
}

@media (max-width: 760px){
  .interworld-inner{
    align-items:flex-start;
  }

  .interworld-group{
    width:100%;
  }

  .interworld-link{
    flex:1 1 calc(50% - 10px);
    text-align:center;
  }
}

    .shell{width:min(980px, 92%); margin:34px auto;}
    .card{
      border:1px solid rgba(216,177,96,.18);
      border-radius:28px;
      padding:34px 28px;
      background:
        radial-gradient(circle at 86% 12%, rgba(216,177,96,.08), transparent 18%),
        linear-gradient(180deg, rgba(28,34,53,.96), rgba(18,24,38,.98));
      box-shadow:var(--shadow);
    }
    .eyebrow{color:#e5c787; text-transform:uppercase; letter-spacing:.08em; font-size:.82rem; margin-bottom:10px;}
    h1{margin:0 0 12px; color:#f0dbaf; font-size:clamp(2rem, 4vw, 3rem);}
    p{margin:0; color:var(--text-soft); line-height:1.8; font-size:1rem;}
  </style>
</head>
<body>

<div class="interworld-bar">
  <div class="interworld-inner">
    <div class="interworld-group">
      <a class="interworld-link primary" href="../index.html">Portal principal</a>
      <a class="interworld-link" href="../cronicas/index.html">Inicio Crónicas</a>
      <a class="interworld-link" href="index.html">Inicio System</a>
    </div>
  </div>
</div>

<main class="shell">
  <section class="card">
    <div class="eyebrow">Sistema de juego</div>
    <h1>Pay &amp; Play System</h1>
    <p>Próximamente. Esta será la entrada al reglamento, fichas, hechizos, enemigos y campañas del sistema.</p>
  </section>
</main>
</body>
</html>
