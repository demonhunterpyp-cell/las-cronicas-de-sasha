<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Portal | Demon Hunter</title>
  <meta name="description" content="Portal principal del universo Demon Hunter: acceso a Las Crónicas de Sasha, Pay & Play System y lore expandido en World Anvil." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://demonhunterpyp-cell.github.io/las-cronicas-de-sasha/index.html" />

  <style>
    :root{
      --bg:#05070d;
      --gold:#d8b160;
      --gold-2:#b78537;
      --text:#f7eedc;
      --soft:#d7c6a4;
      --blue:#6bd5e9;
    }

    *{box-sizing:border-box}

    html,
    body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    body{
      font-family:Georgia, "Times New Roman", serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 50%, rgba(216,177,96,.12), transparent 28%),
        radial-gradient(circle at 18% 50%, rgba(180,72,53,.10), transparent 26%),
        radial-gradient(circle at 84% 50%, rgba(107,213,233,.10), transparent 26%),
        linear-gradient(180deg, #05070d 0%, #101827 48%, #070a11 100%);
    }

    a{color:inherit;text-decoration:none}
    img{display:block;max-width:none;user-select:none;-webkit-user-drag:none}

    .portal{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(216,177,96,.08), transparent 18%),
        linear-gradient(180deg, rgba(21,29,45,.92), rgba(7,10,17,.96));
    }

    .portal::before{
      content:"";
      position:absolute;
      inset:18px;
      z-index:30;
      pointer-events:none;
      border:1px solid rgba(216,177,96,.10);
      border-radius:26px;
    }

    .portal::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:20;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, rgba(216,177,96,.13), transparent 16%),
        linear-gradient(180deg, rgba(255,255,255,.025), transparent 38%, rgba(0,0,0,.22));
    }

    .panel{
      position:absolute;
      inset:0;
      display:block;
      overflow:hidden;
      isolation:isolate;
      transition:filter .28s ease;
      outline:none;
    }

    .panel::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      opacity:.86;
      transition:opacity .28s ease;
    }

    .panel:hover,
    .panel:focus-visible{
      z-index:10;
      filter:brightness(1.10) saturate(1.06);
    }

    .panel:hover::after,
    .panel:focus-visible::after{opacity:.66}

    .panel-img{
      position:absolute;
      z-index:1;
      pointer-events:none;
      transition:transform .36s ease, filter .36s ease, opacity .36s ease;
    }

    .panel:hover .panel-img,
    .panel:focus-visible .panel-img{
      filter:brightness(1.12) saturate(1.08);
      opacity:1;
    }

    .panel-novelas{
      clip-path:polygon(0 0, 50% 50%, 0 100%);
      background:
        radial-gradient(circle at 18% 50%, rgba(216,177,96,.12), transparent 34%),
        linear-gradient(90deg, rgba(18,22,34,.96), rgba(10,13,22,.92));
    }

    .panel-novelas::after{
      background:
        linear-gradient(90deg, rgba(4,6,11,.06), rgba(4,6,11,.12) 43%, rgba(4,6,11,.54)),
        radial-gradient(circle at 20% 54%, rgba(216,177,96,.13), transparent 30%);
    }

    .img-sasha{
      left:-3.4vw;
      top:0;
      width:61vw;
      height:100vh;
      object-fit:cover;
      object-position:left center;
      opacity:.94;
    }

    .panel-novelas:hover .img-sasha,
    .panel-novelas:focus-visible .img-sasha{
      transform:translateX(-1.2vw) scale(1.055);
    }

    .panel-rol{
      clip-path:polygon(0 0, 100% 0, 50% 50%);
      background:
        radial-gradient(circle at 50% 20%, rgba(107,213,233,.12), transparent 34%),
        linear-gradient(180deg, rgba(15,22,36,.98), rgba(8,11,19,.92));
    }

    .panel-rol::after{
      background:
        radial-gradient(circle at 50% 24%, rgba(107,213,233,.18), transparent 28%),
        linear-gradient(180deg, rgba(5,8,16,.10), rgba(5,8,16,.50));
    }

    .img-payplay{
      left:50%;
      top:7.2vh;
      width:min(31vw, 430px);
      height:auto;
      transform:translateX(-50%);
      object-fit:contain;
      opacity:.96;
      filter:
        drop-shadow(0 0 20px rgba(107,213,233,.15))
        drop-shadow(0 18px 34px rgba(0,0,0,.34));
    }

    .panel-rol:hover .img-payplay,
    .panel-rol:focus-visible .img-payplay{
      transform:translateX(-50%) translateY(-.8vh) scale(1.065);
    }

    .panel-lore{
      clip-path:polygon(100% 0, 50% 50%, 100% 100%);
      background:
        radial-gradient(circle at 82% 50%, rgba(107,213,233,.10), transparent 34%),
        linear-gradient(270deg, rgba(17,23,35,.98), rgba(8,11,19,.92));
    }

    .panel-lore::after{
      background:
        linear-gradient(270deg, rgba(4,6,11,.06), rgba(4,6,11,.10) 42%, rgba(4,6,11,.56)),
        radial-gradient(circle at 82% 50%, rgba(107,213,233,.13), transparent 30%);
    }

    .img-lore{
      right:-3vw;
      top:0;
      width:62vw;
      height:100vh;
      object-fit:cover;
      object-position:right center;
      opacity:.92;
    }

    .panel-lore:hover .img-lore,
    .panel-lore:focus-visible .img-lore{
      transform:translateX(1.2vw) scale(1.055);
    }

    .label{
      position:absolute;
      z-index:5;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      max-width:270px;
      padding:11px 15px 12px;
      border-radius:18px;
      border:1px solid rgba(216,177,96,.24);
      background:rgba(5,7,13,.58);
      color:var(--soft);
      text-align:center;
      box-shadow:0 14px 34px rgba(0,0,0,.30), inset 0 0 16px rgba(216,177,96,.035);
      backdrop-filter:blur(7px);
      -webkit-backdrop-filter:blur(7px);
      pointer-events:none;
      transition:transform .25s ease, background .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    .panel:hover .label,
    .panel:focus-visible .label{
      background:rgba(5,7,13,.73);
      border-color:rgba(216,177,96,.46);
      box-shadow:0 18px 38px rgba(0,0,0,.36), 0 0 22px rgba(216,177,96,.18);
    }

    .label small{
      display:block;
      margin-bottom:6px;
      color:var(--gold);
      font-size:.72rem;
      letter-spacing:.14em;
      text-transform:uppercase;
      font-weight:700;
    }

    .label strong{
      display:block;
      color:#f7eedc;
      font-size:clamp(1rem, 1.8vw, 1.42rem);
      line-height:1.02;
      letter-spacing:.01em;
    }

    .label span{
      display:block;
      margin-top:6px;
      color:rgba(215,198,164,.84);
      font-size:.82rem;
      line-height:1.34;
    }

    .label-novelas{left:32%;top:55%;transform:translate(-50%, -50%)}
    .label-rol{left:50%;top:35%;transform:translate(-50%, -50%)}
    .label-lore{left:68%;top:55%;transform:translate(-50%, -50%)}

    .panel:hover .label-novelas,
    .panel:focus-visible .label-novelas,
    .panel:hover .label-rol,
    .panel:focus-visible .label-rol,
    .panel:hover .label-lore,
    .panel:focus-visible .label-lore{
      transform:translate(-50%, -50%) translateY(-3px);
    }

    .center-mark{
      position:absolute;
      left:50%;
      top:50%;
      z-index:35;
      transform:translate(-50%, -50%);
      width:clamp(118px, 13vw, 176px);
      aspect-ratio:1;
      display:grid;
      place-items:center;
      border-radius:50%;
      border:1px solid rgba(216,177,96,.34);
      background:radial-gradient(circle at 50% 38%, rgba(216,177,96,.16), transparent 50%), rgba(5,7,13,.62);
      box-shadow:0 0 34px rgba(216,177,96,.18), 0 18px 46px rgba(0,0,0,.38), inset 0 0 24px rgba(216,177,96,.08);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      pointer-events:none;
    }

    .center-mark span{
      color:#f7d889;
      text-align:center;
      font-size:clamp(.78rem, 1.38vw, 1rem);
      line-height:1.18;
      letter-spacing:.12em;
      text-transform:uppercase;
      text-shadow:0 0 16px rgba(216,177,96,.30);
    }

    .desktop-note{
      position:absolute;
      left:50%;
      bottom:24px;
      z-index:36;
      transform:translateX(-50%);
      width:max-content;
      max-width:calc(100% - 46px);
      padding:9px 14px;
      border-radius:999px;
      border:1px solid rgba(216,177,96,.16);
      background:rgba(5,7,13,.40);
      color:rgba(215,198,164,.70);
      text-align:center;
      font-size:.82rem;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      pointer-events:none;
    }

    @media (max-width:700px){
      html,body{overflow:auto;height:auto}
      .portal{min-height:100vh;height:auto;padding:12px;overflow:visible}
      .portal::before,.portal::after,.center-mark,.desktop-note{display:none}
      .panel{position:relative;inset:auto;display:block;min-height:210px;margin-bottom:12px;clip-path:none!important;border-radius:24px;border:1px solid rgba(216,177,96,.18);overflow:hidden}
      .panel-img{inset:0;width:100%;height:100%;transform:none!important;object-fit:cover}
      .img-payplay{object-fit:contain;padding:24px;background:#05070d}
      .label{left:18px!important;right:18px;bottom:18px;top:auto!important;max-width:none;transform:none!important;align-items:flex-start;text-align:left}
      .label strong{font-size:clamp(1.45rem, 7vw, 2.2rem)}
    }
  </style>
</head>

<body>
  <main class="portal" aria-label="Portal principal de Demon Hunter">
    <a class="panel panel-novelas" href="cronicas/index.html" aria-label="Entrar en Las Crónicas de Sasha">
      <img class="panel-img img-sasha" src="portal/portal-sasha.png" alt="">
      <span class="label label-novelas">
        <small>Novelas</small>
        <strong>Las Crónicas de Sasha</strong>
        <span>Saga principal</span>
      </span>
    </a>

    <a class="panel panel-rol" href="systempyp/index.html" aria-label="Entrar en Pay and Play System">
      <img class="panel-img img-payplay" src="portal/portal-payplay.png" alt="">
      <span class="label label-rol">
        <small>Rol</small>
        <strong>Pay &amp; Play System</strong>
        <span>Reglas y juego</span>
      </span>
    </a>

    <a class="panel panel-lore" href="https://www.worldanvil.com/w/demon-hunter-tabanne" target="_blank" rel="noopener noreferrer" aria-label="Abrir el lore expandido en World Anvil">
      <img class="panel-img img-lore" src="portal/portal-mundo.jpg" alt="">
      <span class="label label-lore">
        <small>Lore</small>
        <strong>Demon Hunter</strong>
        <span>World Anvil</span>
      </span>
    </a>

    <div class="center-mark" aria-hidden="true"><span>Demon<br>Hunter</span></div>
    <div class="desktop-note" aria-hidden="true">Portal de acceso · Novelas · Rol · Lore</div>
  </main>
</body>
</html>
