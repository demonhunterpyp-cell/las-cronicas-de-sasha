<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Portal | DemonHunter</title>
  <meta name="description" content="Portal de acceso al universo DemonHunter: novela, lore expandido y sistema de juego." />

  <style>
    :root{
      --bg:#050912;
      --bg2:#0b1322;
      --gold:#d8b160;
      --gold-2:#b78537;
      --text:#f7eedc;
      --text-soft:#e7d9b8;
      --line:rgba(240,200,111,.34);
      --label-bg:rgba(8,12,22,.52);
      --label-border:rgba(216,177,96,.28);
      --shadow:0 16px 34px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
    }

    body{
      min-height:100vh;
      font-family:Georgia, "Times New Roman", serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(216,177,96,.05), transparent 18%),
        radial-gradient(circle at 80% 15%, rgba(216,177,96,.05), transparent 20%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      overflow:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .portal{
      position:relative;
      width:100%;
      height:100vh;
      overflow:hidden;
      isolation:isolate;
      background:#050912;
    }

    .portal::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 58%, rgba(255,220,150,.04), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,.01), rgba(0,0,0,.06));
      pointer-events:none;
      z-index:1;
    }

    .portal-title{
      position:absolute;
      left:50%;
      top:10px;
      transform:translateX(-50%);
      z-index:20;
      padding:8px 18px;
      border-radius:999px;
      background:rgba(7,11,19,.42);
      border:1px solid rgba(216,177,96,.18);
      color:#f4e7cb;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:.82rem;
      line-height:1;
    }

    .portal-lines{
      position:absolute;
      inset:0;
      z-index:10;
      pointer-events:none;
    }

    .portal-lines svg{
      width:100%;
      height:100%;
      display:block;
    }

    .portal-center{
      position:absolute;
      left:50%;
      top:58%;
      transform:translate(-50%, -50%);
      z-index:14;
      width:18px;
      height:18px;
      border-radius:50%;
      background:radial-gradient(circle, #f0c86f 0%, #c28a39 60%, rgba(194,138,57,0) 100%);
      box-shadow:0 0 18px rgba(240,200,111,.55);
      pointer-events:none;
    }

    .panel{
      position:absolute;
      inset:0;
      display:block;
      overflow:hidden;
      cursor:pointer;
      transition:filter .25s ease;
    }

    .panel:hover,
    .panel:focus-visible{
      filter:brightness(1.06);
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      background-repeat:no-repeat;
      transition:transform .25s ease;
    }

    .panel:hover::before,
    .panel:focus-visible::before{
      transform:scale(1.01);
    }

    .panel-top{
      clip-path:polygon(0 0, 100% 0, 50% 58%);
      z-index:2;
      background:
        radial-gradient(circle at 50% 26%, rgba(216,177,96,.08), transparent 22%),
        linear-gradient(180deg, #040506 0%, #090b11 100%);
    }

    .panel-left{
      clip-path:polygon(0 0, 50% 58%, 50% 100%, 0 100%);
      z-index:4;
    }

    .panel-right{
      clip-path:polygon(100% 0, 50% 58%, 50% 100%, 100% 100%);
      z-index:4;
    }

    /* IZQUIERDA */
    .panel-left::before{
      background-image:
        linear-gradient(180deg, rgba(20,11,7,.015) 0%, rgba(20,11,7,.09) 100%),
        url("assets/portal/portal-sasha.png");

      background-size:
        cover,
        auto 115%;

      background-position:
        center center,
        0% 60%;
    }

    .panel-left::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.02), rgba(0,0,0,.07)),
        linear-gradient(90deg, rgba(0,0,0,.015), rgba(0,0,0,.012) 42%, rgba(0,0,0,.06) 100%);
      pointer-events:none;
      z-index:2;
    }

    /* DERECHA */
    .panel-right::before{
      background-image:
        linear-gradient(180deg, rgba(6,10,18,.08) 0%, rgba(6,10,18,.18) 100%),
        url("assets/portal/portal-mundo.jpg");
      background-size:cover, cover;
      background-position:center center, center center;
    }

    .panel-right::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.14)),
        linear-gradient(90deg, rgba(0,0,0,.03), rgba(0,0,0,.14));
      pointer-events:none;
      z-index:2;
    }

    /* LOGO SUPERIOR */
    .system-logo{
      position:absolute;
      left:50%;
      top:31%;
      transform:translate(-50%, -50%);
      width:min(640px, 46vw);
      z-index:15;
      pointer-events:none;
    }

    .system-logo img{
      display:block;
      width:100%;
      height:auto;
      object-fit:contain;
      filter:drop-shadow(0 14px 28px rgba(0,0,0,.34));
    }

    /* ETIQUETAS MÍNIMAS */
    .section-label{
      position:absolute;
      z-index:16;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 16px;
      border-radius:999px;
      background:var(--label-bg);
      border:1px solid var(--label-border);
      color:var(--gold);
      box-shadow:0 10px 24px rgba(0,0,0,.24);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      text-transform:uppercase;
      letter-spacing:.09em;
      font-size:.8rem;
      font-weight:700;
      line-height:1;
      transition:transform .22s ease, border-color .22s ease, background .22s ease;
    }

    .panel:hover .section-label,
    .panel:focus-visible .section-label{
      transform:translateY(-2px);
      border-color:rgba(216,177,96,.42);
      background:rgba(8,12,22,.62);
    }

    .label-top{
      left:50%;
      top:82px;
      transform:translateX(-50%);
    }

    .panel-top:hover .label-top,
    .panel-top:focus-visible .label-top{
      transform:translateX(-50%) translateY(-2px);
    }

    .label-left{
      left:42px;
      bottom:86px;
    }

    .label-right{
      right:72px;
      bottom:86px;
    }

    @media (max-width: 1180px){
      .system-logo{
        width:min(580px, 48vw);
      }

      .panel-left::before{
        background-size:
          cover,
          auto 112%;

        background-position:
          center center,
          2% 60%;
      }

      .label-left{
        left:36px;
        bottom:74px;
      }

      .label-right{
        right:54px;
        bottom:74px;
      }
    }

    @media (max-width: 980px){
      body{overflow:auto}

      .portal{
        height:auto;
        min-height:100vh;
        display:grid;
        grid-template-columns:1fr;
      }

      .portal-lines,
      .portal-center{
        display:none;
      }

      .panel{
        position:relative;
        inset:auto;
        min-height:33.333vh;
        clip-path:none !important;
      }

      .panel::before{
        transform:none !important;
      }

      .panel-left::before,
      .panel-right::before{
        background-size:cover,cover !important;
        background-position:center center,center center !important;
      }

      .system-logo{
        position:relative;
        left:auto;
        top:auto;
        transform:none !important;
        width:min(520px, 84vw);
        margin:70px auto 20px;
      }

      .section-label{
        position:absolute;
        left:24px;
        right:auto;
        bottom:24px;
        top:auto;
        transform:none !important;
      }

      .label-top{
        left:24px;
        top:24px;
        bottom:auto;
      }
    }
  </style>
</head>

<body>
  <main class="portal">
    <div class="portal-title">Portal de acceso</div>

    <div class="portal-center"></div>

    <div class="portal-lines" aria-hidden="true">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none">
        <line x1="0" y1="0" x2="50" y2="58" stroke="rgba(240,200,111,.34)" stroke-width="0.22"/>
        <line x1="100" y1="0" x2="50" y2="58" stroke="rgba(240,200,111,.34)" stroke-width="0.22"/>
        <line x1="50" y1="58" x2="50" y2="100" stroke="rgba(240,200,111,.34)" stroke-width="0.22"/>
      </svg>
    </div>

    <a class="panel panel-top" href="systempyp/index.html" aria-label="Ir a Pay and Play Rol System">
      <span class="section-label label-top">Rol</span>
    </a>

    <a class="panel panel-left" href="cronicas/index.html" aria-label="Ir a Las Crónicas de Sasha">
      <span class="section-label label-left">Novelas</span>
    </a>

    <a class="panel panel-right" href="https://www.worldanvil.com/w/demon-hunter-tabanne" target="_blank" rel="noopener noreferrer" aria-label="Ir a World Anvil">
      <span class="section-label label-right">Lore</span>
    </a>

    <div class="system-logo" aria-hidden="true">
      <img src="assets/portal/portal-payplay.png" alt="">
    </div>
  </main>
</body>
</html>
