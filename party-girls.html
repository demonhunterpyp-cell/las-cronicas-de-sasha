<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party Girls | Las Crónicas de Sasha</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0f16;
      --panel: #121826;
      --panel-2: #1a2233;
      --text: #f3f5f8;
      --muted: #aab3c2;
      --accent: #d6a85f;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 12px 35px rgba(0,0,0,0.45);
      --radius: 18px;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(7,10,16,0.9), rgba(7,10,16,0.95)),
        url("assets/fondo.jpg") center/cover no-repeat fixed;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      width: min(1200px, 92%);
      margin: 0 auto;
      padding: 28px 0 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 999px;
      transition: 0.25s ease;
    }

    .back-link:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    .hero {
      width: min(1200px, 92%);
      margin: 0 auto;
      padding: 24px 0 34px;
    }

    .hero h1 {
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1.05;
      margin-bottom: 14px;
      color: #fff;
    }

    .hero p {
      max-width: 760px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .gallery-section {
      width: min(1200px, 92%);
      margin: 0 auto 60px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      box-shadow: var(--shadow);
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(214,168,95,0.45);
      box-shadow: 0 18px 40px rgba(0,0,0,0.55);
    }

    .card-image {
      aspect-ratio: 4 / 5;
      overflow: hidden;
      background: #0f1420;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .card:hover .card-image img {
      transform: scale(1.05);
    }

    .card-content {
      padding: 16px;
    }

    .card-content h3 {
      font-size: 1.1rem;
      margin-bottom: 6px;
      color: #fff;
    }

    .card-content .subtitle {
      color: var(--accent);
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .card-content .mini-text {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(3, 6, 12, 0.84);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 999;
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      width: min(1100px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: linear-gradient(180deg, #121826, #0d131f);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 10;
    }

    .modal-close:hover {
      background: rgba(255,255,255,0.16);
    }

    .modal-content {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 0;
      min-height: 560px;
    }

    .modal-image {
      background: #0a0f18;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      border-right: 1px solid var(--border);
    }

    .modal-image img {
      max-width: 100%;
      max-height: 78vh;
      object-fit: contain;
      border-radius: 16px;
    }

    .modal-info {
      padding: 34px 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-info h2 {
      font-size: 2rem;
      color: #fff;
    }

    .modal-role {
      color: var(--accent);
      font-weight: bold;
      font-size: 1rem;
    }

    .modal-description {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
    }

    .info-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .info-box h4 {
      color: #fff;
      margin-bottom: 10px;
      font-size: 1rem;
    }

    .info-box ul {
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .info-box li {
      color: var(--muted);
      line-height: 1.5;
    }

    .info-box strong {
      color: #fff;
    }

    .modal-controls {
      display: flex;
      gap: 12px;
      margin-top: auto;
      padding-top: 8px;
    }

    .modal-btn {
      border: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.96rem;
      transition: 0.2s ease;
    }

    .modal-btn:hover {
      background: rgba(255,255,255,0.14);
    }

    @media (max-width: 900px) {
      .modal-content {
        grid-template-columns: 1fr;
      }

      .modal-image {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 2.2rem;
      }

      .card-content {
        padding: 14px;
      }

      .modal-info {
        padding: 24px 18px 20px;
      }

      .modal-info h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <a href="./index.html" class="back-link">← Volver al inicio</a>
      <a href="./index.html#lore" class="back-link">Personajes</a>
    </div>
    <div class="topbar-right">
      <a href="./aliados.html" class="back-link">Siguiente bloque →</a>
    </div>
  </header>

  <section class="hero">
    <h1>Galería de Party Girls</h1>
    <p>
      Una colección visual del grupo Party Girls. Aquí puedes recorrer distintas escenas,
      composiciones y momentos del grupo, y abrir cada imagen para ver su ficha descriptiva.
    </p>
  </section>

  <main class="gallery-section">
    <div class="gallery-grid" id="galleryGrid"></div>
  </main>

  <div class="modal" id="imageModal">
    <div class="modal-box">
      <button class="modal-close" id="closeModal" aria-label="Cerrar">×</button>

      <div class="modal-content">
        <div class="modal-image">
          <img id="modalImg" src="" alt="" />
        </div>

        <div class="modal-info">
          <h2 id="modalTitle">Título</h2>
          <div class="modal-role" id="modalRole">Rol</div>
          <p class="modal-description" id="modalDescription"></p>

          <div class="info-box">
            <h4>Ficha</h4>
            <ul id="modalData"></ul>
          </div>

          <div class="modal-controls">
            <button class="modal-btn" id="prevBtn">← Anterior</button>
            <button class="modal-btn" id="nextBtn">Siguiente →</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const partyGirlsGallery = [
      {
        image: "assets/galerias/party-girls/party-girls-01.png",
        title: "Party Girls",
        subtitle: "Presentación del grupo",
        preview: "Imagen principal para introducir al conjunto dentro del universo de Sasha.",
        role: "Grupo destacado | Núcleo social",
        description: "Party Girls es uno de los bloques visuales y narrativos más reconocibles del universo de Sasha. Aporta identidad grupal, presencia y una energía propia dentro de la saga.",
        details: [
          { label: "Tipo", value: "Grupo de personajes" },
          { label: "Función", value: "Presencia social y apoyo narrativo" },
          { label: "Valor visual", value: "Identidad compartida" },
          { label: "Uso en web", value: "Galería, lore y presentación" }
        ]
      },
      {
        image: "assets/galerias/party-girls/party-girls-02.png",
        title: "Party Girls",
        subtitle: "Escena conjunta",
        preview: "Composición que refuerza la unidad del grupo y su presencia colectiva.",
        role: "Grupo destacado | Escena coral",
        description: "Aquí el grupo gana fuerza como bloque narrativo y visual. La composición conjunta transmite relación, energía y sentido de pertenencia dentro del mundo de Sasha.",
        details: [
          { label: "Lectura", value: "Unidad y presencia de grupo" },
          { label: "Tono", value: "Cercanía, energía, personalidad" },
          { label: "Enfoque", value: "Composición coral" },
          { label: "Función", value: "Refuerzo de identidad" }
        ]
      },
      {
        image: "assets/galerias/party-girls/party-girls-03.png",
        title: "Party Girls",
        subtitle: "Momento destacado",
        preview: "Variante visual útil para ampliar la galería del grupo.",
        role: "Grupo destacado | Escena especial",
        description: "Esta versión amplía la visión del grupo y ayuda a mostrar distintos registros, atmósferas o dinámicas internas dentro del bloque Party Girls.",
        details: [
          { label: "Tipo de escena", value: "Especial" },
          { label: "Aporta", value: "Variedad visual" },
          { label: "Uso", value: "Galería pública y ficha" },
          { label: "Objetivo", value: "Expandir la presentación del grupo" }
        ]
      },
      {
        image: "assets/galerias/party-girls/party-girls-04.png",
        title: "Party Girls",
        subtitle: "Variante del grupo",
        preview: "Otra lectura visual del bloque Party Girls para enriquecer la sección.",
        role: "Grupo destacado | Variante visual",
        description: "Con esta imagen el grupo gana más matices y puede mostrarse desde otro ángulo, atmósfera o intención narrativa sin perder su identidad general.",
        details: [
          { label: "Aporta", value: "Matiz y amplitud visual" },
          { label: "Valor", value: "Riqueza de presentación" },
          { label: "Sensación", value: "Variedad sin perder unidad" },
          { label: "Uso recomendado", value: "Lore, personajes y promoción" }
        ]
      }
    ];

    const galleryGrid = document.getElementById("galleryGrid");
    const modal = document.getElementById("imageModal");
    const closeModal = document.getElementById("closeModal");

    const modalImg = document.getElementById("modalImg");
    const modalTitle = document.getElementById("modalTitle");
    const modalRole = document.getElementById("modalRole");
    const modalDescription = document.getElementById("modalDescription");
    const modalData = document.getElementById("modalData");

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let currentIndex = 0;

    function renderGallery() {
      galleryGrid.innerHTML = "";

      partyGirlsGallery.forEach((item, index) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="card-image">
            <img src="${item.image}" alt="${item.title} - ${item.subtitle}">
          </div>
          <div class="card-content">
            <h3>${item.title}</h3>
            <div class="subtitle">${item.subtitle}</div>
            <p class="mini-text">${item.preview}</p>
          </div>
        `;

        card.addEventListener("click", () => openModal(index));
        galleryGrid.appendChild(card);
      });
    }

    function openModal(index) {
      currentIndex = index;
      const item = partyGirlsGallery[index];

      modalImg.src = item.image;
      modalImg.alt = item.title + " - " + item.subtitle;
      modalTitle.textContent = item.title + " | " + item.subtitle;
      modalRole.textContent = item.role;
      modalDescription.textContent = item.description;

      modalData.innerHTML = item.details
        .map(detail => `<li><strong>${detail.label}:</strong> ${detail.value}</li>`)
        .join("");

      modal.classList.add("active");
      document.body.style.overflow = "hidden";
    }

    function closeModalWindow() {
      modal.classList.remove("active");
      document.body.style.overflow = "";
    }

    function showPrev() {
      currentIndex = (currentIndex - 1 + partyGirlsGallery.length) % partyGirlsGallery.length;
      openModal(currentIndex);
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % partyGirlsGallery.length;
      openModal(currentIndex);
    }

    closeModal.addEventListener("click", closeModalWindow);
    prevBtn.addEventListener("click", showPrev);
    nextBtn.addEventListener("click", showNext);

    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        closeModalWindow();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (!modal.classList.contains("active")) return;

      if (e.key === "Escape") closeModalWindow();
      if (e.key === "ArrowLeft") showPrev();
      if (e.key === "ArrowRight") showNext();
    });

    renderGallery();
  </script>

</body>
</html>
